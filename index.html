<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f7f1e8">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>Haarpflege</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Karla:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== Journal de Beauté — Papier & Tinte ===== */
:root {
  --paper: #f7f1e8;
  --paper-deep: #f1e7d9;
  --blush: #efdfdb;
  --blush-deep: #e6cbcc;
  --ink: #33222b;
  --ink-soft: #5d4a52;
  --ink-mute: #8a7480;
  --rose: #8f3c5b;
  --rose-soft: #b06a82;
  --gold: #a8823c;
  --line: #dccdc0;
  --line-soft: #e8dccd;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Karla', sans-serif;
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: var(--rose); text-decoration: none; }

/* ===== Layout ===== */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 86px;
  min-height: 100vh;
}

.header {
  background: var(--paper);
  padding: 20px 22px 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 4px double var(--ink);
  text-align: center;
}

.header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 31px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.5px;
  line-height: 1.1;
}

.header .subtitle {
  font-size: 9.5px;
  color: var(--rose);
  letter-spacing: 3.5px;
  text-transform: uppercase;
  margin-top: 5px;
  font-weight: 700;
}

.content { padding: 20px 22px; }

/* ===== Bottom Nav ===== */
.nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  max-width: 480px;
  width: 100%;
  background: var(--paper);
  border-top: 1px solid var(--ink);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom)) 0;
  z-index: 20;
}

.nav-item {
  flex: 1;
  background: none;
  border: none;
  color: var(--ink-mute);
  padding: 7px 4px 5px;
  font-family: inherit;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.nav-item svg {
  width: 19px;
  height: 19px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.nav-item.active { color: var(--rose); font-weight: 800; }

/* ===== Produkt-Unterreiter ===== */
.seg {
  display: flex;
  border: 1px solid var(--ink);
  margin-bottom: 14px;
}
.seg button {
  flex: 1;
  background: none;
  border: none;
  border-right: 1px solid var(--line);
  padding: 11px 2px 10px;
  font-family: inherit;
  font-size: 9.5px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--ink-mute);
  cursor: pointer;
}
.seg button:last-child { border-right: none; }
.seg button.active { background: var(--blush); color: var(--rose); font-weight: 800; }

/* ===== Sektionen (ehem. Cards) ===== */
.card {
  border-top: 1px solid var(--line);
  padding: 20px 2px 18px;
  margin-bottom: 4px;
}

.card h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
}

.card h3 {
  font-size: 10.5px;
  color: var(--rose);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin: 16px 0 10px;
  font-weight: 700;
}

.card h3:first-child { margin-top: 0; }

.card p {
  font-size: 13.5px;
  color: var(--ink-soft);
  margin-bottom: 9px;
}

/* ===== Editor's Note (Haarprofil) ===== */
.today-hero {
  background: var(--blush);
  border: 1px solid var(--blush-deep);
  box-shadow: inset 0 0 0 4px var(--blush), inset 0 0 0 5px var(--rose-soft);
  padding: 26px 26px 24px;
  margin-bottom: 22px;
  text-align: center;
}

.today-hero::before, .today-hero::after { content: none; }

.today-hero .day-label {
  font-size: 9.5px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 9px;
  font-weight: 700;
}

.today-hero .day-name {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 27px;
  color: var(--ink);
  margin-bottom: 10px;
  font-weight: 600;
  line-height: 1.15;
  text-wrap: balance;
}

.today-hero .day-task {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15.5px;
  color: var(--ink-soft);
  line-height: 1.5;
}

/* ===== Routine-Steps ===== */
.step {
  display: flex;
  align-items: flex-start;
  gap: 13px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line-soft);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.step:last-child { border-bottom: none; }

.step .checkbox {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--ink-mute);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  transition: all 0.2s ease;
  margin-top: 2px;
}

.step.done .checkbox {
  background: var(--rose);
  border-color: var(--rose);
}

.step.done .checkbox::after {
  content: '✓';
  color: var(--paper);
  font-weight: 700;
  font-size: 12px;
}

.step .content-step { flex: 1; }

.step .step-title {
  font-weight: 700;
  font-size: 14.5px;
  color: var(--ink);
  margin-bottom: 2px;
}

.step.done .step-title { text-decoration: line-through; color: var(--ink-mute); }
.step.done .step-desc { color: var(--ink-mute); }

.step .step-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.5;
}

/* ===== Produkte ===== */
.search-bar {
  width: 100%;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 12px 14px;
  color: var(--ink);
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 12px;
}

.search-bar:focus { outline: none; border-color: var(--rose); }
.search-bar::placeholder { color: var(--ink-mute); font-style: italic; }

.filter-chips {
  display: flex;
  gap: 4px 16px;
  margin-bottom: 18px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--line);
  padding-bottom: 10px;
}

.chip {
  background: none;
  border: none;
  color: var(--ink-mute);
  padding: 4px 0;
  font-size: 10.5px;
  font-family: inherit;
  font-weight: 600;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  cursor: pointer;
  border-bottom: 1px solid transparent;
}

.chip.active {
  color: var(--rose);
  font-weight: 800;
  border-bottom-color: var(--rose);
}

.product {
  border: 1px solid var(--line);
  background: rgba(255, 252, 245, 0.5);
  padding: 16px 16px 14px;
  margin-bottom: 12px;
}

.product-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 4px;
}

.product-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--ink);
  flex: 1;
  line-height: 1.25;
}

.product-store {
  font-size: 8.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 700;
  padding: 3px 7px;
  white-space: nowrap;
  border: 1px solid var(--line);
  color: var(--ink-mute);
  background: transparent;
}

.product-store.mercadona { color: #4e7a5a; border-color: #b8cfc0; }
.product-store.rossmann { color: var(--rose); border-color: #d8b3c0; }
.product-store.bali { color: #6d5486; border-color: #c8bcd6; }
.product-store.super { color: var(--rose); border-color: var(--blush-deep); }
.product-store.online { color: #7a6134; border-color: #d6c6a4; }

.product-fn {
  font-size: 9.5px;
  color: var(--rose);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 8px;
}

.product-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.55;
}

.product-inci {
  font-size: 11.5px;
  color: var(--ink-soft);
  line-height: 1.5;
  margin-top: 10px;
  padding: 9px 11px;
  background: var(--paper-deep);
  border-left: 2px solid var(--gold);
}

.product-inci .inci-label {
  font-weight: 800;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  font-size: 8.5px;
  color: var(--gold);
  display: block;
  margin-bottom: 3px;
}

.product-tag {
  display: inline-block;
  font-size: 9px;
  padding: 3px 9px;
  margin-top: 12px;
  margin-right: 6px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 800;
  border: 1px solid currentColor;
  background: transparent;
}

.tag-keep { color: #4e7a5a; }
.tag-reduce { color: var(--gold); }
.tag-discard { color: #a04b43; }
.tag-empty { color: var(--ink-mute); }
.tag-buy { color: #4a6b8a; }
.tag-maybe { color: var(--gold); }
.tag-skip { color: #a04b43; }

/* Listen-Überschriften (Einkaufszettel, Regal-Check) */
.list-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 800;
  color: var(--rose);
  margin: 26px 0 12px;
}

.list-heading::before, .list-heading::after {
  content: '';
  flex: 1;
  border-top: 1px solid var(--line);
}

.list-note {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14.5px;
  color: var(--ink-mute);
  text-align: center;
  margin: -4px 0 14px;
}

/* ===== Guides (Akkordeon-Register) ===== */
.week-day {
  border: 1px solid var(--line);
  margin-bottom: -1px;
  background: transparent;
}

.week-day.open { border-color: var(--rose-soft); position: relative; z-index: 1; }

.week-day-header {
  padding: 15px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  gap: 12px;
}

.week-day.open .week-day-header { background: var(--blush); }

.product-photo {
  float: right;
  width: 54px;
  height: 72px;
  object-fit: contain;
  background: #fff;
  border: 1px solid var(--line);
  padding: 4px;
  margin: 0 0 6px 10px;
}

.product { overflow: hidden; }

.product-rank {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 15px;
  color: var(--gold);
  margin-right: 8px;
}

.guide-no {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 15px;
  color: var(--gold);
  margin-right: 10px;
}

.week-day-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 18.5px;
  color: var(--ink);
  line-height: 1.2;
}

.week-day-task {
  font-size: 9px;
  color: var(--ink-mute);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  margin-top: 3px;
}

.week-day.open .week-day-task { color: var(--rose); }

.acc-arrow {
  font-family: 'Cormorant Garamond', serif;
  color: var(--rose-soft);
  font-size: 22px;
  line-height: 1;
  flex-shrink: 0;
}

.week-day-body { padding: 4px 16px 16px; display: none; }
.week-day.open .week-day-body { display: block; }

.guide-intro {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15.5px;
  color: var(--ink-soft);
  line-height: 1.5;
  padding: 10px 0 12px;
  border-bottom: 1px solid var(--line-soft);
}

/* ===== Frisuren ===== */
.hairstyle-section-title {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  margin: 26px 0 4px;
}

.hairstyle-section-title:first-child { margin-top: 4px; }

.hairstyle-section-title::before, .hairstyle-section-title::after {
  content: '';
  flex: 1;
  border-top: 1px solid var(--line);
}

.hairstyle {
  border-bottom: 1px solid var(--line-soft);
  padding: 16px 2px;
}

.hairstyle-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 6px;
}

.hairstyle-icon {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 15px;
  color: var(--gold);
  flex-shrink: 0;
  white-space: nowrap;
}

.hairstyle-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  color: var(--ink);
  font-weight: 700;
  line-height: 1.2;
}

.hairstyle-when {
  font-size: 9px;
  color: var(--rose);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  font-weight: 700;
  margin-top: 2px;
}

.hairstyle-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.55;
}

/* ===== Reset Button ===== */
.reset-btn {
  background: transparent;
  border: 1px solid var(--ink-mute);
  color: var(--ink-soft);
  padding: 11px 18px;
  font-family: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  margin-top: 14px;
  width: 100%;
  text-transform: uppercase;
}

.reset-btn:active { background: var(--blush); }

/* ===== Empty State ===== */
.empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--ink-mute);
  font-size: 16px;
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
}

.fade-in { animation: fadeIn 0.25s ease-out; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .fade-in { animation: none; }
}

.step-desc strong, .product-desc strong, .card p strong {
  color: var(--rose);
  font-weight: 700;
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1 id="header-title">Routinen</h1>
    <div class="subtitle" id="header-subtitle">Dein Haar-Guide</div>
  </header>

  <main class="content" id="content"></main>

  <nav class="nav">
    <button class="nav-item active" data-view="routines">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5C9.1 7.2 6.5 10.7 6.5 13.9a5.5 5.5 0 0 0 11 0C17.5 10.7 14.9 7.2 12 3.5Z"/><path d="M9.4 14.2a2.6 2.6 0 0 0 2.2 2.5"/></svg>
      <span>Routinen</span>
    </button>
    <button class="nav-item" data-view="products">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 3.2h4"/><path d="M10.8 3.2v3.1L8.5 9v9.5a2 2 0 0 0 2 2h3a2 2 0 0 0 2-2V9l-2.3-2.7V3.2"/><path d="M8.5 13.2h7"/></svg>
      <span>Produkte</span>
    </button>
    <button class="nav-item" data-view="hairstyles">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5.5 8.3h13v2.9h-13z"/><path d="M7 11.2v5.4M9.5 11.2v5.4M12 11.2v5.4M14.5 11.2v5.4M17 11.2v4.2"/></svg>
      <span>Frisuren</span>
    </button>
  </nav>
</div>

<script>
// =========================================
// DATEN
// =========================================

const STORAGE_KEY = 'haarpflege_v1';

// Routinen als flexible Guides — kein fester Wochenplan.
// Du entscheidest selbst, wann du wäschst; die Guides sagen dir WIE.
const GUIDES = [
  {
    id: 'wash-quick',
    title: 'Wäsche — Schnell',
    tag: 'Waschtag · ~20 Min',
    intro: 'Die Alltags-Wäsche, wenn es fix gehen soll. Danach weiter mit einem der beiden Styling-Guides (Wellen oder Glatt).',
    steps: [
      { id: 'wq-1', title: 'Detangling vor der Dusche', desc: 'Trockene Haare mit den Fingern oder dem Wide-Tooth-Comb grob entwirren. Keine Bürste auf trockenen Wellen.' },
      { id: 'wq-2', title: 'Shampoo: Champú Curl Perfect', desc: 'Haselnussgroße Menge, in den Händen aufschäumen, nur die Kopfhaut massieren. Beim Ausspülen läuft der Schaum durch die Längen — das reicht. (Das Hydra-Shampoo nur noch aufbrauchen — es ist strenger als gedacht, siehe Produkte-Tab.)' },
      { id: 'wq-3', title: 'Conditioner: Bali Curls Moisturising', desc: 'Walnussgroße Menge in Längen + Spitzen, NICHT an den Ansatz. Er ist reichhaltig — lieber sparsam. 1-2 Min einwirken. (Übernimmt, bis der leere L\'Oréal ersetzt ist — Nachkauf-Tipps im Produkte-Tab.)' },
      { id: 'wq-4', title: 'Wide-Tooth-Comb', desc: 'Mit Conditioner im Haar durchkämmen. Von den Spitzen nach oben, in kleinen Sektionen.' },
      { id: 'wq-5', title: 'Squish to Condish + ausspülen', desc: 'Eine Handvoll Wasser ins Haar, von unten nach oben pressen — dann den Conditioner gründlich ausspülen. Optional 10 Sek kalt nachspülen (kleiner Glanz-Bonus, kein Muss).' },
      { id: 'wq-6', title: 'Sanft trocknen', desc: 'NICHT rubbeln. Haare ins Mikrofaser-Handtuch oder T-Shirt drücken. Bei Wellen-Styling: 5-10 Min Plopping — Turban aber nicht viel länger tragen (Dejan-Garz-Regel: zu langes Einwickeln macht Frizz).' },
      { id: 'wq-7', title: 'Leave-in — EINE Wahl', desc: 'Wahl A: 2-3 Sprühstöße Hydra Spray (am leichtesten, mit UV-Schutz — gut für die aufgehellten Längen). Wahl B: erbsengroß ISANA Leave-in (silikonfrei, etwas reichhaltiger). Nie beide gleichzeitig, nur Längen + Spitzen.' },
      { id: 'wq-8', title: 'Weiter mit Styling', desc: 'Jetzt den passenden Styling-Guide öffnen: „Wellen & Locken" (Diffusor/Lufttrocknen) oder „Glatt geföhnt" (Rundbürste).' }
    ]
  },
  {
    id: 'wash-care',
    title: 'Wäsche — Pflege intensiv',
    tag: 'Waschtag · ~35 Min',
    intro: 'Die gründliche Wäsche mit mehr Pflegezeit — z.B. am Wochenende. Etwa alle 1-2 Wochen darf hier eine Glanz-Maske rein.',
    steps: [
      { id: 'wc-1', title: 'Detangling vor der Dusche', desc: 'Trockene Haare mit den Fingern entwirren. Keine Bürste.' },
      { id: 'wc-2', title: 'Shampoo: Curl Perfect — 2× (Double Cleansing)', desc: 'Beim ersten Durchgang löst sich Buildup, beim zweiten reinigt das Shampoo richtig. Beide Male nur am Ansatz aufschäumen.' },
      { id: 'wc-3', title: 'Pflege: Standard = Bali Curls Conditioner', desc: 'Großzügiger als bei der schnellen Wäsche: walnussgroße Menge in Längen + Spitzen, 3-5 Min einwirken. Das ist dein Feuchtigkeits-Standard.' },
      { id: 'wc-4', title: 'ODER alle 1-2 Wochen: Glanz-Maske', desc: 'Statt Schritt 3: Mascarilla Hydra Hyaluronic ODER L\'Oréal Glycolic Gloss (nie beide in derselben Woche!). 5-10 Min einwirken — länger bringt laut Dejan Garz nichts. Seine Methode: nach dem Ausspülen der Maske noch kurz Conditioner drüber (versiegelt). Beide Masken enthalten Silikon → im Wechsel mit dem Klärungs-Reset einplanen.' },
      { id: 'wc-5', title: 'Wide-Tooth-Comb + Squish to Condish', desc: 'Mit Pflege im Haar durchkämmen, dann Wasser von unten nach oben ins Haar pressen. Gründlich ausspülen, optional kalt nachspülen.' },

const HAIRSTYLE_SECTIONS = {
  schlafen: 'Schlafen',
  alltag: 'Alltag',
  sport: 'Sport',
  spezial: 'Spezial & Anlass'
};

// =========================================
// STATE
// =========================================

let state = {
  view: 'routines',
  routineTab: 'wash', // 'wash' | 'between' | 'wissen'
  hairTab: 'schlafen',
  productFilter: 'all',
  productSearch: '',
  checkedSteps: {}, // { 'wq-1_2026-07-15': true }
  openGuides: {}
};

function loadState() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      const parsed = JSON.parse(stored);
      state.checkedSteps = parsed.checkedSteps || {};
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      checkedSteps: state.checkedSteps
    }));
  } catch(e) {}
}

// =========================================
// HELPERS
// =========================================

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function stepKey(stepId) {
  return `${stepId}_${todayKey()}`;
}

function isStepDone(stepId) {
  return !!state.checkedSteps[stepKey(stepId)];
}

function toggleStep(stepId) {
  const k = stepKey(stepId);
  if (state.checkedSteps[k]) {
    delete state.checkedSteps[k];
  } else {
    state.checkedSteps[k] = true;
  }
  saveState();
}

function resetTodaysSteps() {
  const today = todayKey();
  Object.keys(state.checkedSteps).forEach(k => {
    if (k.endsWith(today)) delete state.checkedSteps[k];
  });
  saveState();
}

function hairstyleCount() {
  return Object.values(HAIRSTYLES).reduce((n, arr) => n + arr.length, 0);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// =========================================
// RENDER
// =========================================

function render() {
  const content = document.getElementById('content');
  content.className = 'content fade-in';
  setTimeout(() => content.className = 'content', 250);

  const headerTitle = document.getElementById('header-title');
  const headerSubtitle = document.getElementById('header-subtitle');

  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view);
  });

  if (state.view === 'routines') {
    headerTitle.textContent = 'Routinen';
    headerSubtitle.textContent = { wash: 'Wäsche & Styling', between: 'Zwischen den Wäschen', wissen: 'Dein Haar-Wissen' }[state.routineTab];
    content.innerHTML = renderRoutines();
  } else if (state.view === 'products') {
    headerTitle.textContent = 'Produkte';
    headerSubtitle.textContent = `${PRODUCTS.length + SHOPPING.length + DEJAN_SHOPPING.length + DEJAN_POST.length + SHELF.length} Produkte · INCI-geprüft`;
    content.innerHTML = renderProducts();
    setupProductHandlers();
  } else if (state.view === 'hairstyles') {
    headerTitle.textContent = 'Frisuren';
    headerSubtitle.textContent = `${HAIRSTYLES[state.hairTab].length} von ${hairstyleCount()} Looks · ${HAIRSTYLE_SECTIONS[state.hairTab]}`;
    content.innerHTML = renderHairstyles();
  }
}

const ROUTINE_TABS = {
  wash: ['wash-quick', 'wash-care', 'style-waves', 'style-blowout'],
  between: ['refresh', 'clarify']
};

function segRow(pairs, attr, active) {
  const cells = pairs.map(([k, label]) => `<button class="${active === k ? 'active' : ''}" data-${attr}="${k}">${label}</button>`).join('');
  return `<div class="seg">${cells}</div>`;
}

function guideHtml(g) {
  const gi = GUIDES.indexOf(g);
  const isOpen = !!state.openGuides[g.id];
  const stepsHtml = g.steps.map(st => {
    const done = isStepDone(st.id);
    return `
      <div class="step ${done ? 'done' : ''}" data-step="${st.id}">
        <div class="checkbox"></div>
        <div class="content-step">
          <div class="step-title">${escapeHtml(st.title)}</div>
          <div class="step-desc">${escapeHtml(st.desc)}</div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="week-day ${isOpen ? 'open' : ''}">
      <div class="week-day-header" onclick="toggleGuide('${g.id}')">
        <div>
          <div class="week-day-name"><span class="guide-no">N&ordm; ${String(gi + 1).padStart(2, '0')}</span>${escapeHtml(g.title)}</div>
          <div class="week-day-task">${escapeHtml(g.tag)}</div>
        </div>
        <div class="acc-arrow">${isOpen ? '&minus;' : '+'}</div>
      </div>
      <div class="week-day-body">
        <div class="guide-intro">${escapeHtml(g.intro)}</div>
        ${stepsHtml}
      </div>
    </div>
  `;
}

      <p style="font-size:13px"><strong>2. So selten wie möglich waschen</strong> — deine ~2 Wäschen pro Woche passen genau. Shampoo nur an die Kopfhaut, Conditioner nur in die Längen: machst du schon.</p>

      <p style="font-size:13px"><strong>5. Silikone &amp; Sulfate sind nicht böse</strong> — die Dosis macht das Gift. Genau so ist deine Routine gebaut: Glanzmasken ja, aber mit Klärungs-Reset.</p>
      <p style="font-size:13px"><strong>6. Öl nach jeder Wäsche</strong> — dein Sérum-Finish. Und: dünne Haargummis meiden — Spiral-Gummi oder Seiden-Scrunchie nutzt du schon.</p>
      <p style="font-size:12px;color:var(--ink-mute);font-style:italic">Hinweis: Dejan Garz verkauft seit 2025 eine eigene Pflegeserie („The Foundation") — inzwischen auch bei Rossmann. Seine Grundregeln sind davon unabhängig; seine Produkt-Tipps (inkl. dem kompletten Post vom 17. Juli) sind im Einkaufszettel einzeln INCI-geprüft — nicht alles davon passt zu feinem Wellenhaar.</p>

  if (state.routineTab === 'wash') {
    html += `<h3 class="list-heading">Die Wäsche — wähle eine</h3>`;
    html += guides.slice(0, 2).map(guideHtml).join('');
    html += `<h3 class="list-heading">Danach: Styling — wähle einen Weg</h3>`;
    html += guides.slice(2).map(guideHtml).join('');
  } else {
    html += `<p class="list-note">Für alle Tage ohne Wäsche — und den regelmäßigen Reset.</p>`;
    html += guides.map(guideHtml).join('');
  }

  html += `<button class="reset-btn" onclick="handleReset()">Häkchen von heute zurücksetzen</button>`;

}

function productCard(p) {
  const verdictLabel = { keep: 'Behalten', reduce: 'Reduzieren', discard: 'Aussortieren', empty: 'Leer', buy: 'Kaufen lohnt sich', maybe: 'Okay mit Einschränkung', skip: 'Stehen lassen' }[p.verdict];
  const storeLabel = { mercadona: 'Mercadona', rossmann: 'Rossmann', bali: 'Bali Curls', super: 'Rossmann', online: 'Online/Salon' }[p.store];
  const photo = PRODUCT_IMAGES[p.id];
  return `
    <div class="product ${p.verdict}">
      ${photo ? `<img class="product-photo" src="${photo}" alt="" loading="lazy" onerror="this.remove()">` : ''}
      <div class="product-header">
        <div class="product-name">${p._rank && p._rank < 99 ? `<span class="product-rank">N&ordm; ${p._rank}</span>` : ''}${escapeHtml(p.name)}</div>
        <span class="product-store ${p.store}">${escapeHtml(storeLabel)}</span>
      </div>
      <div class="product-fn">${escapeHtml(p.fn)}</div>
      <div class="product-desc">${escapeHtml(p.desc)}</div>
      ${p.inci ? `<div class="product-inci"><span class="inci-label">INCI-Check</span>${escapeHtml(p.inci)}</div>` : ''}
      ${['keep', 'buy', 'empty'].includes(p.verdict) ? '' : `<span class="product-tag tag-${p.verdict}">${escapeHtml(verdictLabel)}</span>`}
    </div>
  `;
}

function filterProducts(list) {
  return list.filter(p => {
    if (state.productFilter !== 'all' && p.cat !== state.productFilter) return false;
    if (state.productSearch) {
      const q = state.productSearch.toLowerCase();
      if (!p.name.toLowerCase().includes(q) && !p.fn.toLowerCase().includes(q) && !p.desc.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function groupedHtml(list, groupKeys, keyFn, labels) {
  let html = '';
  groupKeys.forEach(k => {
    const items = list.filter(p => keyFn(p) === k);
    if (!items.length) return;
    html += `<h3 class="list-heading">${escapeHtml(labels[k])}</h3>`;
    html += items.map(productCard).join('');
  });
  return html;
}

// Eine Liste fuer alles — pro Kategorie global gerankt: Nº 1 = beste Wahl
// fuers Haarprofil, absteigend bis zu den Stehenlassen-Kandidaten.
// Kriterien: leicht & silikonfrei vor silikonhaltig, profilgenau (Wellen/
// blondiert) vor generisch, Protein-Flags nach hinten, skip ganz unten.
const CATEGORY_RANKING = {
  shampoo:     ['p1', 'g1', 'n15', 's3', 'g2', 'n16', 'p3', 'dp4', 's10', 's11', 's5', 'p2', 's15', 's18', 's21'],
  conditioner: ['dp1', 'n4', 'p5', 'n2', 'n1', 'dp3', 's1', 'n3', 'p4', 'dp5', 's6', 'dp9'],
  mask:        ['n5', 's4', 'dp2', 'n6', 'n7', 's2', 'p7b', 'p6', 's8', 's12', 'dp10', 's16', 's19', 's20', 's22'],
  leavein:     ['n9', 'n8', 'p8b', 'p9', 'p8', 'n10', 'n11', 'dp6', 'dp7', 'dp8', 's7', 's9', 'p7', 's13', 'dp11'],
  oil:         ['p10', 'n12', 'n13', 'n14', 'g4', 's17', 's14'],
  tool:        ['p11', 'g3', 'p12']
};

function allProducts() {
  const pos = p => {
    const i = (CATEGORY_RANKING[p.cat] || []).indexOf(p.id);
    return i === -1 ? 99 : i;
  };
  return PRODUCTS
    .concat(SHOPPING, DEJAN_SHOPPING, DEJAN_POST, SHELF)
    .map(p => ({ ...p, _rank: pos(p) + 1 }))
    .sort((a, b) => a._rank - b._rank);
}

function productListHtml() {
  const items = filterProducts(allProducts());
  let html = `<p class="list-note">Alle Produkte INCI-geprüft und pro Kategorie gerankt — N&ordm; 1 ist die beste Wahl für dein Haar, danach absteigend bis zu den Stehenlassen-Kandidaten (inkl. deinem Rossmann-Regal-Check).</p>`;
  if (state.productFilter === 'all' && !state.productSearch) {
    html += groupedHtml(items, Object.keys(PRODUCT_CATEGORIES).filter(k => k !== 'all'), p => p.cat, PRODUCT_CATEGORIES);
  } else {
    html += items.map(productCard).join('');
  }
  if (!html.includes('class="product')) {
    html = `<div class="empty">Nichts gefunden.</div>`;
  }
  return html;
}

function renderProducts() {
  const chipsHtml = Object.entries(PRODUCT_CATEGORIES).map(([k, v]) =>
    `<button class="chip ${state.productFilter === k ? 'active' : ''}" data-filter="${k}">${escapeHtml(v)}</button>`
  ).join('');

  return `
    <input type="search" class="search-bar" id="product-search" placeholder="Produkt suchen..." value="${escapeHtml(state.productSearch)}">
    <div class="filter-chips">${chipsHtml}</div>
    <div id="product-list">${productListHtml()}</div>
  `;
}

// =========================================
// EVENT HANDLERS
// =========================================

function setupProductHandlers() {
  const search = document.getElementById('product-search');
  if (search) {
    search.addEventListener('input', e => {
      state.productSearch = e.target.value;
      const list = document.getElementById('product-list');
      if (list) list.innerHTML = productListHtml();
    });
  }

  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      state.productFilter = c.dataset.filter;
      render();
    });
  });


}

function toggleGuide(id) {
  state.openGuides[id] = !state.openGuides[id];
  render();
}

function handleReset() {
  if (confirm('Alle abgehakten Schritte für heute zurücksetzen?')) {
    resetTodaysSteps();
    render();
  }
}

// Step toggle + Unterreiter (delegiert)
document.addEventListener('click', e => {
  const step = e.target.closest('.step[data-step]');
  if (step && state.view === 'routines') {
    toggleStep(step.dataset.step);
    render();
    return;
  }
  const segBtn = e.target.closest('.seg button');
  if (segBtn) {
    if (segBtn.dataset.rtab) {
      state.routineTab = segBtn.dataset.rtab;
    } else if (segBtn.dataset.htab) {
      state.hairTab = segBtn.dataset.htab;
    }
    render();
  }
});

// Nav
document.querySelectorAll('.nav-item').forEach(b => {
  b.addEventListener('click', () => {
    state.view = b.dataset.view;
    render();
  });
});

// Globals für inline-onclick
window.toggleGuide = toggleGuide;
window.handleReset = handleReset;

// Init
loadState();
render();
</script>
</body>
</html>
