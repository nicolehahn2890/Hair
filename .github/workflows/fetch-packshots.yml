name: Fetch product packshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pillow

      - name: Fetch and resize packshots
        run: python scripts/fetch_packshots.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add img/ scripts/packshot_report.json
          git diff --cached --quiet || git commit -m "Add auto-fetched product packshots"
          git push
